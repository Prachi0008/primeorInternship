<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Responsive Image Gallery</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <h1>Responsive Image Gallery</h1>

        <p>
            Click any image to enlarge it and enjoy the automatic slideshow.
        </p>

    </header>



    <!-- ================= GALLERY ================= -->

    <section class="gallery">

        <div class="image">

            <img src="images/img1.jpg"
                 alt="Nature 1">

        </div>

        <div class="image">

            <img src="images/img2.jpg"
                 alt="Nature 2">

        </div>

        <div class="image">

            <img src="images/img3.jpg"
                 alt="Nature 3">

        </div>

        <div class="image">

            <img src="images/img4.jpg"
                 alt="Nature 4">

        </div>

        <div class="image">

            <img src="images/img5.jpg"
                 alt="Nature 5">

        </div>

        <div class="image">

            <img src="images/img6.jpg"
                 alt="Nature 6">

        </div>

    </section>



    <!-- ================= LIGHTBOX ================= -->

    <div class="lightbox"
         id="lightbox">

        <span class="close">

            &times;

        </span>

        <img class="lightbox-image"
             id="lightboxImage">

        <div class="caption"
             id="caption">

        </div>

    </div>



    <!-- ================= SLIDESHOW ================= -->

   <section class="slideshow-section">

    <h2>Automatic Slideshow</h2>

    <div class="slider">

        <div class="slides">

            <img src="images/img1.jpg" alt="Image 1">

            <img src="images/img2.jpg" alt="Image 2">

            <img src="images/img3.jpg" alt="Image 3">

            <img src="images/img4.jpg" alt="Image 4">

            <img src="images/img5.jpg" alt="Image 5">

            <img src="images/img6.jpg" alt="Image 6">

        </div>

    </div>

</section>



    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            © 2026 Responsive Image Gallery

        </p>

    </footer>



    <script src="js/script.js"></script>

</body>

</html>
